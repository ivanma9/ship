name: Deploy

# Railway auto-deploys the API on every push to master (GitHub repo connected).
# Vercel auto-deploys the frontend on every push to master (GitHub App connected).
#
# Both platforms handle deploys natively — no manual CLI steps needed.
#
# Railway project: profound-beauty (web service + Postgres)
#   URL: https://web-production-cd8b.up.railway.app
# Vercel project: asu-mare/ship-frontend-web
#   URL: https://ship-frontend-web.vercel.app

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  noop:
    name: Deployments handled by Railway and Vercel GitHub integrations
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "Railway and Vercel deploy automatically on push to master."
