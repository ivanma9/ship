name: Deploy

# Runs automatically after CI passes on master.
# Railway auto-deploys the API on push (connected to GitHub repo).
# This workflow handles Vercel frontend deployment only.
#
# Required GitHub secrets:
#   RAILWAY_API_TOKEN      - Railway API token (not used here but kept for reference)
#   VERCEL_TOKEN           - Vercel personal access token
#   VERCEL_ORG_ID          - Vercel team/org ID
#   VERCEL_PROJECT_ID      - Vercel project ID

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        # Vercel runs the build itself using its configured buildCommand
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ vars.RAILWAY_API_URL }}
