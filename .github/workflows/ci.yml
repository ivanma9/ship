name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ship_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build:shared

      - name: Type check
        run: pnpm type-check

      - name: Check type violation ceiling
        run: ./scripts/count-type-violations.sh 416

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ship_test

      - name: Run unit tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ship_test

      - name: Build web (analyze)
        run: pnpm --filter web run build:analyze
        env:
          VITE_API_URL: ''

      - name: Check bundle budget
        run: pnpm --filter web run bundle:check

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: |
            web/dist/bundle-report.html
            web/dist/bundle-size.json
          if-no-files-found: error

  accessibility-gates:
    # Zero-tolerance: fails if any serious/critical axe violation exists on covered routes.
    # Activate only after all fixes in 007-a11y-completion-gates are merged.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ship_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm build:shared

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build web for preview
        run: pnpm --filter @ship/web build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Run accessibility gate tests
        run: pnpm exec playwright test e2e/accessibility.spec.ts --reporter=list
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ship_test
          PLAYWRIGHT_WORKERS: 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-gate-results
          path: test-results/
          retention-days: 30
